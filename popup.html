<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ChatGPT Cleaner</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="header">
          <div class="title-row">
            <span class="app-pill">AI</span>
            <h2>GPT Cleaner</h2>
          </div>
          <p>Keep your chat lightweight and responsive.</p>
        </div>

        <div class="field">
          <label for="count">Messages to keep</label>
          <input type="number" id="count" min="1" value="5" />
        </div>

        <div class="switch-row">
          <div class="switch-copy">
            <span class="switch-title">Auto clean</span>
            <span class="switch-subtitle">Clean new turns automatically</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="autoClean" />
            <span class="slider"></span>
          </label>
        </div>

        <button id="runBtn">Clean Now</button>

        <p class="hint">Tip: Keep Auto clean on for smooth long chats.</p>
      </div>

      <div class="footer">
        Created by
        <a
          href="https://www.linkedin.com/in/reza-zare-7327a8218/"
          target="_blank"
          >Reza Zare</a
        >
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
